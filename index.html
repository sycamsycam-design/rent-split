<script>
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const YEARS=Array.from({length:7},(_,i)=>114+i);
const ICONS={w:'💧',e:'⚡',g:'🔥'};

function yOpts(def){return YEARS.map(y=>`<option value="${y}" ${y===def?'selected':''}>${y}年</option>`).join('');}
function mOpts(def){return MONTHS.map((m,i)=>`<option value="${i+1}" ${(i+1)===def?'selected':''}>${m}</option>`).join('');}
function dOpts(def){return Array.from({length:31},(_,i)=>i+1).map(d=>`<option value="${d}" ${d===def?'selected':''}>${d}日</option>`).join('');}

function dateStack(id,defY,defM,defD,onChange=''){
  const oc=onChange?`onchange="${onChange}"`:'';
  return `<div id="${id}">
    <select ${oc}>${yOpts(defY)}</select>
    <select ${oc}>${mOpts(defM)}</select>
    <select ${oc}>${dOpts(defD)}</select>
  </div>`;
}

const utils=[
  {name:'水費',icon:'💧',ps:'w',cls:'water',dm:3,dd:20,em:5,ed:19},
  {name:'電費',icon:'⚡',ps:'e',cls:'elec', dm:3,dd:18,em:5,ed:17},
  {name:'瓦斯',icon:'🔥',ps:'g',cls:'gas',  dm:3,dd:22,em:5,ed:21},
];

function buildUtils(){
  document.getElementById('utilGrid').innerHTML=utils.map(u=>`
    <div class="util-card ${u.cls}">
      <div class="util-card-title"><span class="icon">${u.icon}</span>${u.name}</div>
      <div class="date-group">
        <div class="field"><label>起始日</label>${dateStack(`${u.ps}-start`,115,u.dm,u.dd,'updateDaysAll()')}</div>
      </div>
      <div class="date-group">
        <div class="field"><label>結束日</label>${dateStack(`${u.ps}-end`,115,u.em,u.ed,'updateDaysAll()')}</div>
      </div>
      <div class="amt-field">
        <label>金額（元）</label>
        <input type="number" id="${u.ps}-amt" inputmode="numeric" placeholder="0" min="0">
      </div>
      <div class="days-tip" id="${u.ps}-days"></div>
    </div>`).join('');
}

function getDate(id){
  const el=document.getElementById(id);if(!el)return null;
  const s=el.querySelectorAll('select');
  const d=new Date(parseInt(s[0].value)+1911,parseInt(s[1].value)-1,parseInt(s[2].value));
  return isNaN(d)?null:d;
}
function daysDiff(a,b){return Math.round((b-a)/86400000)+1;}
function overlapDays(ts,te,rs,re){const s=Math.max(ts,rs),e=Math.min(te,re);return e<s?0:Math.round((e-s)/86400000)+1;}

function updateDaysAll(){
  utils.forEach(u=>{
    const s=getDate(`${u.ps}-start`),e=getDate(`${u.ps}-end`);
    document.getElementById(`${u.ps}-days`).textContent=(s&&e&&e>=s)?`區間共 ${daysDiff(s,e)} 天`:'';
  });
}

let tripIdx={my:0,room:0};

function addTrip(who){
  const idx=++tripIdx[who];
  const container=document.getElementById(who==='my'?'myTrips':'roomTrips');
  const div=document.createElement('div');
  div.className='trip-item';div.dataset.who=who;div.dataset.idx=idx;
  div.innerHTML=`
    <div class="trip-item-header">
      <span class="trip-item-label">第 ${idx} 筆</span>
      <button class="trip-remove" onclick="this.closest('.trip-item').remove()">×</button>
    </div>
    <div class="trip-dates">
      <div class="trip-date-row">
        <span class="trip-lbl">出發</span>
        <div class="date-inline" id="trip-${who}-${idx}-s">
          <select>${yOpts(115)}</select><select>${mOpts(1)}</select><select>${dOpts(1)}</select>
        </div>
      </div>
      <div class="trip-date-row">
        <span class="trip-lbl">返回</span>
        <div class="date-inline" id="trip-${who}-${idx}-e">
          <select>${yOpts(115)}</select><select>${mOpts(1)}</select><select>${dOpts(1)}</select>
        </div>
      </div>
    </div>`;
  container.appendChild(div);
}

function getTripDates(who){
  const rows=document.querySelectorAll(`.trip-item[data-who="${who}"]`);
  const trips=[];
  rows.forEach(row=>{
    const idx=row.dataset.idx;
    const s=getDate(`trip-${who}-${idx}-s`),e=getDate(`trip-${who}-${idx}-e`);
    if(s&&e&&e>=s)trips.push([s.getTime(),e.getTime()]);
  });
  return trips;
}

function calcAbsent(trips,rs,re){
  let absent=0;
  trips.forEach(([ts,te])=>{absent+=overlapDays(ts,te,rs.getTime(),re.getTime());});
  return Math.min(absent,daysDiff(rs,re));
}

function fmtDate(d){return `${d.getFullYear()-1911}/${d.getMonth()+1}/${d.getDate()}`;}

function calculate(){
  const myTrips=getTripDates('my'),roomTrips=getTripDates('room');
  let myTotal=0,roomTotal=0,detailHTML='',valid=false;

  utils.forEach(u=>{
    const s=getDate(`${u.ps}-start`),e=getDate(`${u.ps}-end`);
    const amt=parseFloat(document.getElementById(`${u.ps}-amt`).value)||0;
    if(!s||!e||e<s||amt<=0)return;
    valid=true;

    const total=daysDiff(s,e);
    const myAbsent=calcAbsent(myTrips,s,e);
    const roomAbsent=calcAbsent(roomTrips,s,e);
    const myDays=total-myAbsent,roomDays=total-roomAbsent;
    const personDays=myDays+roomDays;
    const myShare=personDays>0?amt*myDays/personDays:amt/2;
    const roomShare=amt-myShare;
    myTotal+=myShare;roomTotal+=roomShare;

    const myTag=myAbsent>0?`<div class="absent-tag">不在 ${myAbsent} 天</div>`:'';
    const roomTag=roomAbsent>0?`<div class="absent-tag">不在 ${roomAbsent} 天</div>`:'';

    detailHTML+=`<div class="detail-row">
      <div class="detail-row-title"><span class="icon">${u.icon}</span>${u.name}　<span style="font-weight:400;font-size:12px;color:#7F77DD;">${fmtDate(s)} ～ ${fmtDate(e)}（${total}天）</span></div>
      <div class="detail-cols">
        <div><div class="detail-col-hd">總金額</div><div class="detail-col-val">$${amt.toFixed(0)}</div></div>
        <div><div class="detail-col-hd">嘉瑋應付</div><div class="detail-col-val blue">$${myShare.toFixed(0)}</div><div class="detail-col-sub">${myDays}天在家${myTag}</div></div>
        <div><div class="detail-col-hd">楷揚應付</div><div class="detail-col-val">$${roomShare.toFixed(0)}</div><div class="detail-col-sub">${roomDays}天在家${roomTag}</div></div>
      </div>
    </div>`;
  });

  if(!valid){alert('請至少填寫一項費用的日期和金額');return;}

  const grand=myTotal+roomTotal;
  detailHTML+=`<div class="detail-row total-row">
    <div class="detail-row-title">合計</div>
    <div class="detail-cols">
      <div><div class="detail-col-hd">總金額</div><div class="detail-col-val">$${grand.toFixed(0)}</div></div>
      <div><div class="detail-col-hd">嘉瑋應付</div><div class="detail-col-val blue">$${myTotal.toFixed(0)}</div></div>
      <div><div class="detail-col-hd">楷揚應付</div><div class="detail-col-val">$${roomTotal.toFixed(0)}</div></div>
    </div>
  </div>`;

  document.getElementById('detailSection').innerHTML=detailHTML;
  document.getElementById('summaryCards').innerHTML=`
    <div class="metric">
      <div class="metric-name">👤 嘉瑋應付</div>
      <div class="metric-val">$${myTotal.toFixed(0)}</div>
      <div class="metric-sub">${myTrips.length} 筆不在紀錄</div>
    </div>
    <div class="metric">
      <div class="metric-name">👤 楷揚應付</div>
      <div class="metric-val">$${roomTotal.toFixed(0)}</div>
      <div class="metric-sub">${roomTrips.length} 筆不在紀錄</div>
    </div>`;

  document.getElementById('results').style.display='block';
  setTimeout(()=>document.getElementById('results').scrollIntoView({behavior:'smooth'}),100);
}

buildUtils();
updateDaysAll();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>


</body></html>
